<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BariTotalCare | The Complete Solution for Bariatric Program Management</title>
  <meta
    name="description"
    content="BariTotalCare by Bariatric Centers of America. From the first ad click to long-term follow-up, one integrated bariatric CRM platform."
  />
  <link rel="icon" type="image/png" href="./brand-mark.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --denim: #323f4e;
      --hunter: #27423e;
      --teal: #447073;
      --ocean: #7dbdb6;
      --mist: #a8c7ca;
      --coral: #dd5b57;
      --midnight: #1c1e1d;
      --charcoal: #3d3d3d;
      --dove: #d8dadb;
      --stone: #ededed;
      --white: #ffffff;
      --display: "Canela", "Cormorant Garamond", serif;
      --body: "Euclid", "Euclid Circular A", "Manrope", sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(125, 189, 182, 0.18), transparent 32%),
        radial-gradient(circle at top right, rgba(221, 91, 87, 0.12), transparent 26%),
        linear-gradient(180deg, #f8f6f2 0%, #f0ece5 100%);
      color: var(--charcoal);
      font-family: var(--body);
    }

    button { font: inherit; }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(22px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes drift {
      0%, 100% { transform: translate3d(0, 0, 0); }
      50% { transform: translate3d(0, -14px, 0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script type="text/babel">
    const { useEffect, useState } = React;

    const COLORS = {
      denim: "#323F4E",
      hunter: "#27423E",
      teal: "#447073",
      ocean: "#7DBDB6",
      mist: "#A8C7CA",
      coral: "#DD5B57",
      midnight: "#1C1E1D",
      charcoal: "#3D3D3D",
      dove: "#D8DADB",
      stone: "#EDEDED",
      white: "#FFFFFF",
      shell: "#F8F6F2",
      cardShadow: "0 24px 60px rgba(39, 66, 62, 0.08)",
    };

    const FONT_DISPLAY = '"Canela", "Cormorant Garamond", serif';
    const FONT_BODY = '"Euclid", "Euclid Circular A", "Manrope", sans-serif';
    const STATS_NOTE = "Illustrative ROI and workflow benchmarks shown for positioning; validate against your own program data.";

    const PRODUCTS = [
      {
        id: "lead",
        name: "BariLead",
        tagline: "Drive More Traffic Through Digital",
        phase: "Attract",
        phaseNum: "01",
        accent: COLORS.hunter,
        accentSoft: "rgba(39, 66, 62, 0.09)",
        accentGlow: "rgba(39, 66, 62, 0.18)",
        stats: [
          { value: "3-5x", label: "increase in qualified leads" },
          { value: "40%", label: "lower cost per acquisition" },
          { value: "24/7", label: "automated lead capture" },
        ],
        painPoints: [
          "Marketing spend is hard to tie back to actual consult volume.",
          "Referrals still arrive by fax, phone, and disconnected intake channels.",
          "New leads sit untouched while staff manually triage who should call back.",
          "Your team is doing qualification and nurture work by hand.",
        ],
        promise:
          "Turn every digital touchpoint into a qualified consult. BariLead automates lead capture, qualification, and nurture — so your team focuses on patients, not paperwork.",
        solution:
          "BariLead connects your paid advertising, website scheduling, and referral sources directly to your CRM. Every lead is captured, qualified, and nurtured automatically with AI-powered intake calls, personalized AI-driven SMS and email marketing nurture drip campaigns, and around-the-clock automation built for bariatric programs.",
        features: [
          "Paid advertising integration with automated lead routing",
          "Conversational AI for patient intake calls",
          "AI-generated email and SMS campaign automation",
          "Physician referral portal",
          "Campaign ROI tracking by source and channel",
        ],
      },
      {
        id: "nav",
        name: "BariNav",
        tagline: "Enhance the Patient Experience",
        phase: "Convert",
        phaseNum: "02",
        accent: COLORS.teal,
        accentSoft: "rgba(68, 112, 115, 0.09)",
        accentGlow: "rgba(68, 112, 115, 0.18)",
        stats: [
          { value: "60%", label: "faster intake processing" },
          { value: "65%", label: "improvement in attended to surgery ratios" },
          { value: "2x", label: "staff productivity gains" },
        ],
        painPoints: [
          "Your coordinators are buried in spreadsheets and sticky notes.",
          "Patients get lost in the process.",
          "Following up on pre-op requirements is tedious and time-consuming.",
          "Manual tasks pile up with no automation to simplify the workflow.",
        ],
        promise:
          "Give your care team complete visibility over every patient’s journey — from first consult through surgery — so no one slips through the cracks.",
        solution:
          "BariNav is the CRM purpose-built for bariatric care. From the first consult through surgery, medical weight loss, and nutrition therapy, it tracks milestones, manages tasks, and ensures compliance, giving your team complete oversight of each patient’s journey.",
        features: [
          "Prospect to patient to program workflow engine",
          "AI-powered insurance verification and patient navigation",
          "Automated patient messaging by email and SMS",
          "Customizable medical, surgical, and nutritional program pathways",
          "Medication management and prescription tracking",
        ],
      },
      {
        id: "success",
        name: "BariSuccess",
        tagline: "The Future Delivery of Post-Op Care",
        phase: "Retain",
        phaseNum: "03",
        accent: COLORS.coral,
        accentSoft: "rgba(221, 91, 87, 0.09)",
        accentGlow: "rgba(221, 91, 87, 0.18)",
        stats: [
          { value: "85%", label: "long-term patient engagement" },
          { value: "Real-time", label: "biometric data capture" },
          { value: "3x", label: "improvement in follow-up rates" },
        ],
        painPoints: [
          "Post-op patients fail to consistently follow up.",
          "Follow-up visits and progress go untracked.",
          "Patient success and weight outcomes are unknown.",
          "Additional revenue opportunities are left on the table.",
        ],
        promise:
          "Keep every post-op patient connected and on track. BariSuccess turns real-time biometric data into proactive outreach — before problems escalate and revenue walks out the door.",
        solution:
          "BariSuccess equips every patient with a connected scale that updates weight, BMI, and body composition data directly in BariTotalCare, giving your team a clear view of patient progress. Your team sees trends in real time, automated workflows re-engage patients before problems escalate, and outcomes data strengthens your payer negotiations.",
        features: [
          "Connected smart scale to CRM data pipeline",
          "Weight, BMI, and body composition trend dashboards",
          "Automated check-in and re-engagement workflows",
          "Remote patient monitoring billing support",
          "Mine post-op patient data for follow-up opportunities",
          "Outcomes reporting for payer negotiations",
        ],
      },
    ];

    function BrandMark({ size = 46 }) {
      return (
        <img
          src="./brand-mark.png"
          alt="Bariatric Centers of America"
          style={{
            width: size,
            height: size,
            objectFit: "contain",
            flexShrink: 0,
          }}
        />
      );
    }

    function BrandWordmark({ compact = false }) {
      return (
        <div style={{ display: "flex", alignItems: "center", gap: compact ? 12 : 16 }}>
          <BrandMark size={compact ? 42 : 56} />
          <div>
            <div
              style={{
                fontFamily: FONT_DISPLAY,
                fontSize: compact ? 26 : 38,
                lineHeight: 0.95,
                letterSpacing: "-0.04em",
                color: COLORS.hunter,
              }}
            >
              BariTotalCare
            </div>
            <div
              style={{
                marginTop: 6,
                fontSize: compact ? 11 : 12,
                letterSpacing: "0.18em",
                textTransform: "uppercase",
                color: COLORS.teal,
                fontWeight: 700,
              }}
            >
              Bariatric CRM Platform
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [view, setView] = useState("hero");
      const [activeProduct, setActiveProduct] = useState(null);
      const [animateIn, setAnimateIn] = useState(false);
      const [width, setWidth] = useState(window.innerWidth);

      useEffect(() => {
        const timeoutId = window.setTimeout(() => setAnimateIn(true), 100);
        const handleResize = () => setWidth(window.innerWidth);
        window.addEventListener("resize", handleResize);
        return () => {
          window.clearTimeout(timeoutId);
          window.removeEventListener("resize", handleResize);
        };
      }, []);

      const isTablet = width < 1100;
      const isMobile = width < 780;

      const navigateTo = (nextView, product = null) => {
        setAnimateIn(false);
        window.setTimeout(() => {
          setView(nextView);
          setActiveProduct(product);
          setAnimateIn(true);
          window.scrollTo({ top: 0, behavior: "smooth" });
        }, 220);
      };

      const active = activeProduct || PRODUCTS[0];

      return (
        <div
          style={{
            minHeight: "100vh",
            color: COLORS.charcoal,
            fontFamily: FONT_BODY,
            position: "relative",
            overflow: "hidden",
          }}
        >
          <div style={{ position: "absolute", inset: 0, pointerEvents: "none", overflow: "hidden" }}>
            <div
              style={{
                position: "absolute",
                width: 420,
                height: 420,
                top: -120,
                left: -90,
                borderRadius: "50%",
                background: "radial-gradient(circle, rgba(125, 189, 182, 0.34), transparent 70%)",
                animation: "drift 10s ease-in-out infinite",
              }}
            />
            <div
              style={{
                position: "absolute",
                width: 380,
                height: 380,
                top: 120,
                right: -100,
                borderRadius: "50%",
                background: "radial-gradient(circle, rgba(221, 91, 87, 0.18), transparent 70%)",
                animation: "drift 13s ease-in-out infinite",
              }}
            />
          </div>

          <nav
            style={{
              position: "sticky",
              top: 0,
              zIndex: 20,
              padding: isMobile ? "18px 18px" : "20px 32px",
              backdropFilter: "blur(16px)",
              background: "rgba(248, 246, 242, 0.78)",
              borderBottom: "1px solid rgba(50, 63, 78, 0.08)",
            }}
          >
            <div
              style={{
                maxWidth: 1240,
                margin: "0 auto",
                display: "flex",
                alignItems: "center",
                justifyContent: "space-between",
                gap: 18,
              }}
            >
              <div style={{ cursor: "pointer" }} onClick={() => navigateTo("hero")}>
                <BrandWordmark compact />
              </div>
              <div
                style={{
                  display: "flex",
                  flexWrap: "wrap",
                  justifyContent: "flex-end",
                  gap: 10,
                }}
              >
                {view !== "hero" && PRODUCTS.map((product) => (
                  <button
                    key={product.id}
                    onClick={() => navigateTo("detail", product)}
                    style={{
                      border: `1px solid ${active?.id === product.id ? product.accent : "rgba(50, 63, 78, 0.14)"}`,
                      background: active?.id === product.id ? product.accentSoft : "rgba(255,255,255,0.72)",
                      color: active?.id === product.id ? product.accent : COLORS.denim,
                      borderRadius: 999,
                      padding: "10px 16px",
                      fontSize: 13,
                      fontWeight: 700,
                      cursor: "pointer",
                    }}
                  >
                    {product.name}
                  </button>
                ))}
                <button
                  onClick={() => window.open("https://calendly.com/bariatric-centers/bca-discovery-call-baritotalcare", "_blank")}
                  style={{
                    border: "none",
                    background: COLORS.coral,
                    color: COLORS.white,
                    borderRadius: 999,
                    padding: "10px 18px",
                    fontSize: 13,
                    fontWeight: 800,
                    cursor: "pointer",
                    boxShadow: "0 14px 30px rgba(221, 91, 87, 0.25)",
                  }}
                >
                  Schedule Demo
                </button>
              </div>
            </div>
          </nav>

          <main
            style={{
              position: "relative",
              zIndex: 2,
              maxWidth: 1240,
              margin: "0 auto",
              padding: isMobile ? "30px 18px 48px" : "56px 32px 72px",
              opacity: animateIn ? 1 : 0,
              transform: animateIn ? "translateY(0)" : "translateY(18px)",
              transition: "opacity 0.45s ease, transform 0.45s ease",
            }}
          >
            {view === "hero" && (
              <section>
                <div
                  style={{
                    display: "grid",
                    gridTemplateColumns: isTablet ? "1fr" : "1.08fr 0.92fr",
                    gap: isTablet ? 26 : 42,
                    alignItems: "center",
                    marginBottom: 38,
                  }}
                >
                  <div
                    style={{
                      background: "rgba(255,255,255,0.72)",
                      border: "1px solid rgba(50, 63, 78, 0.08)",
                      borderRadius: 32,
                      padding: isMobile ? "28px 22px" : "42px 42px 38px",
                      boxShadow: COLORS.cardShadow,
                    }}
                  >
                    <div
                      style={{
                        display: "inline-flex",
                        alignItems: "center",
                        gap: 10,
                        padding: "9px 14px",
                        borderRadius: 999,
                        background: "rgba(125, 189, 182, 0.16)",
                        color: COLORS.hunter,
                        fontSize: 12,
                        fontWeight: 800,
                        letterSpacing: "0.15em",
                        textTransform: "uppercase",
                        marginBottom: 24,
                      }}
                    >
                      Purpose-built platform
                    </div>
                    <BrandWordmark />
                    <h1
                      style={{
                        margin: "28px 0 18px",
                        fontFamily: FONT_DISPLAY,
                        fontSize: "clamp(48px, 7vw, 86px)",
                        lineHeight: 0.92,
                        letterSpacing: "-0.05em",
                        color: COLORS.denim,
                      }}
                    >
                      The complete solution for bariatric program management.
                    </h1>
                    <p
                      style={{
                        margin: 0,
                        fontSize: isMobile ? 18 : 21,
                        lineHeight: 1.7,
                        color: COLORS.charcoal,
                        maxWidth: 760,
                      }}
                    >
                      From the first ad click to long-term follow-up - one integrated platform that replaces spreadsheets, fax machines, and guesswork with a purpose-built bariatric CRM.
                    </p>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 14, marginTop: 30 }}>
                      <button
                        onClick={() => navigateTo("overview")}
                        style={{
                          border: "none",
                          background: COLORS.coral,
                          color: COLORS.white,
                          borderRadius: 16,
                          padding: "16px 24px",
                          fontSize: 15,
                          fontWeight: 800,
                          cursor: "pointer",
                          boxShadow: "0 18px 36px rgba(221, 91, 87, 0.28)",
                        }}
                      >
                        See How It Works
                      </button>
                      <button
                        onClick={() => window.open("https://calendly.com/bariatric-centers/bca-discovery-call-baritotalcare", "_blank")}
                        style={{
                          border: `1px solid ${COLORS.hunter}`,
                          background: "transparent",
                          color: COLORS.hunter,
                          borderRadius: 16,
                          padding: "16px 24px",
                          fontSize: 15,
                          fontWeight: 700,
                          cursor: "pointer",
                        }}
                      >
                        Book a live walkthrough
                      </button>
                    </div>
                  </div>

                  <div
                    style={{
                      background: `linear-gradient(180deg, rgba(39, 66, 62, 0.94), rgba(50, 63, 78, 0.98))`,
                      borderRadius: 34,
                      padding: isMobile ? "28px 22px" : "38px 34px",
                      color: COLORS.white,
                      boxShadow: "0 36px 64px rgba(39, 66, 62, 0.18)",
                    }}
                  >
                    <div style={{ color: COLORS.mist, fontSize: 12, fontWeight: 800, letterSpacing: "0.16em", textTransform: "uppercase" }}>
                      One connected operating system
                    </div>
                    <div
                      style={{
                        marginTop: 18,
                        display: "grid",
                        gridTemplateColumns: "1fr",
                        gap: 18,
                      }}
                    >
                      {PRODUCTS.map((product, index) => (
                        <div key={product.id}>
                          <button
                            onClick={() => navigateTo("detail", product)}
                            style={{
                              width: "100%",
                              textAlign: "left",
                              display: "grid",
                              gridTemplateColumns: isMobile ? "1fr" : "92px 1fr auto",
                              gap: 18,
                              alignItems: "center",
                              border: `1px solid ${product.accent}55`,
                              background: "rgba(255,255,255,0.06)",
                              color: COLORS.white,
                              borderRadius: 24,
                              padding: isMobile ? "18px" : "22px 22px 22px 20px",
                              cursor: "pointer",
                            }}
                          >
                            <div>
                              <div style={{ fontSize: 12, letterSpacing: "0.18em", textTransform: "uppercase", color: COLORS.ocean, fontWeight: 800 }}>
                                {product.phase}
                              </div>
                              <div style={{ marginTop: 8, fontSize: 34, fontFamily: FONT_DISPLAY, lineHeight: 0.9 }}>{product.phaseNum}</div>
                            </div>
                            <div>
                              <div style={{ fontFamily: FONT_DISPLAY, fontSize: isMobile ? 34 : 38, lineHeight: 0.95 }}>{product.name}</div>
                              <div style={{ marginTop: 8, fontSize: isMobile ? 15 : 17, lineHeight: 1.5, color: COLORS.dove }}>
                                {product.tagline}
                              </div>
                            </div>
                            <div style={{ fontSize: 14, fontWeight: 800, color: COLORS.ocean }}>
                              Explore →
                            </div>
                          </button>
                          {index < PRODUCTS.length - 1 && (
                            <div
                              style={{
                                width: 2,
                                height: isMobile ? 28 : 34,
                                background: `linear-gradient(180deg, ${product.accent}, ${PRODUCTS[index + 1].accent})`,
                                margin: "0 auto",
                                opacity: 0.85,
                              }}
                            />
                          )}
                        </div>
                      ))}
                    </div>
                    <div
                      style={{
                        marginTop: 18,
                        paddingTop: 16,
                        borderTop: "1px solid rgba(255,255,255,0.12)",
                        fontSize: 13,
                        lineHeight: 1.6,
                        color: COLORS.mist,
                      }}
                    >
                      Explore each product to see its capabilities and ROI.
                    </div>
                  </div>
                </div>
              </section>
            )}

            {view === "overview" && (
              <section>
                <div style={{ textAlign: "center", maxWidth: 860, margin: "0 auto 34px" }}>
                  <div style={{ color: COLORS.teal, fontSize: 12, fontWeight: 800, letterSpacing: "0.18em", textTransform: "uppercase" }}>
                    The bariatric funnel
                  </div>
                  <h2
                    style={{
                      margin: "14px 0 12px",
                      fontFamily: FONT_DISPLAY,
                      fontSize: "clamp(42px, 6vw, 68px)",
                      lineHeight: 0.95,
                      letterSpacing: "-0.05em",
                      color: COLORS.denim,
                    }}
                  >
                    Three products. One integrated patient journey.
                  </h2>
                  <p style={{ margin: 0, fontSize: 19, lineHeight: 1.7, color: COLORS.charcoal }}>
                    Explore each product to see its capabilities and ROI.
                  </p>
                </div>

                <div style={{ display: "grid", gap: 22 }}>
                  {PRODUCTS.map((product, index) => (
                    <button
                      key={product.id}
                      onClick={() => navigateTo("detail", product)}
                      style={{
                        width: "100%",
                        textAlign: "left",
                        display: "grid",
                        gridTemplateColumns: isTablet ? "1fr" : "210px 1.2fr 0.9fr",
                        gap: 24,
                        padding: isMobile ? "24px 20px" : "30px 30px 30px 26px",
                        borderRadius: 30,
                        border: `1px solid ${product.accent}22`,
                        background: "rgba(255,255,255,0.86)",
                        boxShadow: COLORS.cardShadow,
                        cursor: "pointer",
                      }}
                    >
                      <div
                        style={{
                          borderRadius: 24,
                          padding: isMobile ? "18px 16px" : "24px 22px",
                          background: `linear-gradient(180deg, ${product.accentSoft}, rgba(255,255,255,0.92))`,
                          border: `1px solid ${product.accent}20`,
                          display: "flex",
                          flexDirection: "column",
                          justifyContent: "space-between",
                          minHeight: 190,
                        }}
                      >
                        <div>
                          <div style={{ color: product.accent, fontSize: 12, fontWeight: 800, letterSpacing: "0.16em", textTransform: "uppercase" }}>
                            Stage {product.phaseNum}
                          </div>
                          <div style={{ marginTop: 10, fontFamily: FONT_DISPLAY, fontSize: 42, lineHeight: 0.92, color: COLORS.denim }}>
                            {product.name}
                          </div>
                          <div style={{ marginTop: 10, fontSize: 17, lineHeight: 1.55, color: COLORS.charcoal }}>
                            {product.tagline}
                          </div>
                        </div>
                        <div style={{ marginTop: 20, color: product.accent, fontSize: 14, fontWeight: 800 }}>
                          {product.phase} the patient journey
                        </div>
                      </div>

                      <div>
                        <div style={{ color: COLORS.denim, fontSize: 13, fontWeight: 800, letterSpacing: "0.15em", textTransform: "uppercase" }}>
                          Why it matters
                        </div>
                        <p style={{ margin: "12px 0 20px", fontSize: 18, lineHeight: 1.8, color: COLORS.charcoal }}>
                          {product.solution}
                        </p>
                        <div style={{ display: "grid", gap: 10 }}>
                          {product.features.slice(0, 3).map((feature) => (
                            <div key={feature} style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                              <div style={{ width: 9, height: 9, marginTop: 10, borderRadius: "50%", background: product.accent, flexShrink: 0 }} />
                              <div style={{ fontSize: 16, lineHeight: 1.65, color: COLORS.charcoal }}>{feature}</div>
                            </div>
                          ))}
                        </div>
                      </div>

                      <div
                        style={{
                          display: "grid",
                          gridTemplateColumns: isMobile ? "1fr" : "repeat(2, minmax(0, 1fr))",
                          gap: 14,
                          alignContent: "start",
                        }}
                      >
                        {product.stats.slice(0, 2).map((stat) => (
                          <div
                            key={stat.label}
                            style={{
                              borderRadius: 22,
                              padding: "18px 16px",
                              background: COLORS.shell,
                              border: `1px solid ${product.accent}1a`,
                            }}
                          >
                            <div style={{ fontFamily: FONT_DISPLAY, fontSize: 34, lineHeight: 0.92, color: product.accent }}>
                              {stat.value}
                            </div>
                            <div style={{ marginTop: 8, fontSize: 14, lineHeight: 1.55, color: COLORS.charcoal }}>
                              {stat.label}
                            </div>
                          </div>
                        ))}
                        <div
                          style={{
                            gridColumn: isMobile ? "auto" : "1 / -1",
                            borderRadius: 22,
                            padding: "18px 16px",
                            background: `linear-gradient(135deg, ${product.accentSoft}, rgba(255,255,255,0.95))`,
                            border: `1px solid ${product.accent}22`,
                            color: COLORS.denim,
                            fontSize: 14,
                            lineHeight: 1.6,
                            fontWeight: 700,
                          }}
                        >
                          Open the {product.name} page for the full problem, solution, stats, and capability breakdown.
                        </div>
                      </div>
                    </button>
                  ))}
                </div>

                <div
                  style={{
                    marginTop: 24,
                    display: "grid",
                    gridTemplateColumns: isTablet ? "1fr" : "1.15fr 0.85fr",
                    gap: 18,
                    alignItems: "stretch",
                  }}
                >
                  <div
                    style={{
                      borderRadius: 28,
                      padding: isMobile ? "24px 20px" : "28px 28px",

                    style={{
                      borderRadius: 28,
                      padding: isMobile ? "24px 20px" : "28px 28px",

                      color: COLORS.white,
                      boxShadow: "0 30px 60px rgba(50, 63, 78, 0.18)",
                    }}
                  >
                    <div style={{ color: COLORS.ocean, fontSize: 12, fontWeight: 800, letterSpacing: "0.15em", textTransform: "uppercase" }}>
                      Contact
                    </div>
                    <div style={{ marginTop: 12, fontFamily: FONT_DISPLAY, fontSize: 34, lineHeight: 0.96 }}>
                      Ready to see the full platform in action?

                    <div style={{ marginTop: 12, fontSize: 16, lineHeight: 1.7, color: COLORS.mist }}>
                      BariTotalCare brings marketing, intake, clinical coordination, and post-op follow-up into one connected system.
                    </div>
                    <div style={{ marginTop: 18, display: "grid", gap: 4, fontSize: 15, lineHeight: 1.6 }}>
                      <div>BariTotalCare.com</div>
                      <div>706.284.3185</div>
                      <div>care@bcofa.com</div>
                    </div>
                  </div>
                </div>
              </section>
            )}

                <button
                  onClick={() => navigateTo("overview")}

                    border: `1px solid ${COLORS.denim}20`,
                    background: "rgba(255,255,255,0.78)",
                    color: COLORS.denim,
                    borderRadius: 999,
                    padding: "10px 16px",
                    fontSize: 13,
                    fontWeight: 800,
                    cursor: "pointer",
                    marginBottom: 22,
                  }}
                >
                  ← Back to platform overview
                </button>

                <div
                  style={{
                    borderRadius: 34,
                    padding: isMobile ? "28px 22px" : "34px 34px 30px",
                    background: `linear-gradient(135deg, rgba(255,255,255,0.94), ${active.accentSoft})`,
                    border: `1px solid ${active.accent}24`,
                    boxShadow: COLORS.cardShadow,
                  }}
                >
                  <div
                    style={{
                      display: "grid",
                      gridTemplateColumns: isTablet ? "1fr" : "1.08fr 0.92fr",
                      gap: 24,
                      alignItems: "end",
                    }}
                  >
                    <div>
                      <div style={{ color: active.accent, fontSize: 12, fontWeight: 800, letterSpacing: "0.18em", textTransform: "uppercase" }}>
                        Stage {active.phaseNum} · {active.phase}
                      </div>
                      <h2
                        style={{
                          margin: "14px 0 10px",
                          fontFamily: FONT_DISPLAY,
                          fontSize: "clamp(48px, 7vw, 78px)",
                          lineHeight: 0.9,
                          letterSpacing: "-0.05em",
                          color: COLORS.denim,
                        }}
                      >
                        {active.name}
                      </h2>
                      <p style={{ margin: 0, fontSize: isMobile ? 19 : 22, lineHeight: 1.7, color: COLORS.charcoal }}>
                        {active.tagline}
                      </p>
                    </div>
                    <div
                      style={{
                        borderRadius: 26,
                        background: COLORS.white,
                        border: `1px solid ${active.accent}1e`,
                        padding: isMobile ? "20px 18px" : "22px 22px",
                      }}
                    >
                      <div style={{ color: active.accent, fontSize: 12, fontWeight: 800, letterSpacing: "0.14em", textTransform: "uppercase" }}>
                        Product promise
                      </div>
                      <div style={{ marginTop: 10, fontSize: 18, lineHeight: 1.8, color: COLORS.charcoal }}>
                        {active.promise}
                      </div>
                    </div>
                  </div>
                </div>

                <div
                  style={{
                    marginTop: 22,
                    display: "grid",
                    gridTemplateColumns: isTablet ? "1fr" : "1fr 1fr",
                    gap: 18,
                  }}
                >
                  <div
                    style={{
                      borderRadius: 28,
                      padding: isMobile ? "24px 20px" : "28px 28px",
                      background: "rgba(255,255,255,0.88)",
                      border: "1px solid rgba(221, 91, 87, 0.18)",
                      boxShadow: COLORS.cardShadow,
                    }}
                  >
                    <div style={{ color: COLORS.coral, fontSize: 12, fontWeight: 800, letterSpacing: "0.15em", textTransform: "uppercase" }}>
                      The problem today
                    </div>
                    <div style={{ marginTop: 16, display: "grid", gap: 14 }}>
                      {active.painPoints.map((point) => (
                        <div key={point} style={{ display: "flex", gap: 14, alignItems: "flex-start" }}>
                          <div
                            style={{
                              width: 12,
                              height: 12,
                              borderRadius: "50%",
                              marginTop: 8,
                              background: COLORS.coral,
                              flexShrink: 0,
                            }}
                          />
                          <div style={{ fontSize: 18, lineHeight: 1.7, color: COLORS.charcoal }}>{point}</div>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div
                    style={{
                      borderRadius: 28,
                      padding: isMobile ? "24px 20px" : "28px 28px",
                      background: `linear-gradient(180deg, ${active.accentSoft}, rgba(255,255,255,0.9))`,
                      border: `1px solid ${active.accent}20`,
                      boxShadow: COLORS.cardShadow,
                    }}
                  >
                    <div style={{ color: active.accent, fontSize: 12, fontWeight: 800, letterSpacing: "0.15em", textTransform: "uppercase" }}>
                      The BariTotalCare solution
                    </div>
                    <div style={{ marginTop: 14, fontSize: 19, lineHeight: 1.85, color: COLORS.charcoal }}>
                      {active.solution}
                    </div>
                  </div>
                </div>

                <div style={{ marginTop: 22 }}>
                  <div style={{ color: COLORS.denim, fontSize: 12, fontWeight: 800, letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: 14 }}>
                    Sample impact metrics
                  </div>
                  <div
                    style={{
                      display: "grid",
                      gridTemplateColumns: isMobile ? "1fr" : "repeat(3, minmax(0, 1fr))",
                      gap: 16,
                    }}
                  >
                    {active.stats.map((stat) => (
                      <div
                        key={stat.label}
                        style={{
                          borderRadius: 26,
                          padding: "24px 22px",
                          background: "rgba(255,255,255,0.9)",
                          border: `1px solid ${active.accent}1e`,
                          boxShadow: COLORS.cardShadow,
                          textAlign: isMobile ? "left" : "center",
                        }}
                      >
                        <div
                          style={{
                            fontFamily: FONT_DISPLAY,
                            fontSize: isMobile ? 44 : 52,
                            lineHeight: 0.88,
                            color: active.accent,
                          }}
                        >
                          {stat.value}
                        </div>
                        <div style={{ marginTop: 10, fontSize: 17, lineHeight: 1.6, color: COLORS.charcoal }}>
                          {stat.label}
                        </div>
                      </div>
                    ))}
                  </div>
                  <div style={{ marginTop: 10, fontSize: 13, lineHeight: 1.7, color: COLORS.teal }}>
                    {STATS_NOTE}
                  </div>
                </div>

                <div
                  style={{
                    marginTop: 22,
                    borderRadius: 28,
                    padding: isMobile ? "24px 20px" : "30px 30px",
                    background: COLORS.denim,
                    color: COLORS.white,
                    boxShadow: "0 34px 60px rgba(50, 63, 78, 0.18)",
                  }}
                >
                  <div style={{ color: COLORS.ocean, fontSize: 12, fontWeight: 800, letterSpacing: "0.15em", textTransform: "uppercase" }}>
                    Key capabilities
                  </div>
                  <div
                    style={{
                      marginTop: 18,
                      display: "grid",
                      gridTemplateColumns: isTablet ? "1fr" : "1fr 1fr",
                      gap: 16,
                    }}
                  >
                    {active.features.map((feature) => (
                      <div
                        key={feature}
                        style={{
                          display: "flex",
                          gap: 14,
                          alignItems: "flex-start",
                          padding: "18px 18px",
                          borderRadius: 22,
                          background: "rgba(255,255,255,0.06)",
                          border: "1px solid rgba(255,255,255,0.08)",
                        }}
                      >
                        <div
                          style={{
                            width: 10,
                            height: 10,
                            marginTop: 9,
                            borderRadius: "50%",
                            background: active.accent,
                            flexShrink: 0,
                          }}
                        />
                        <div style={{ fontSize: 17, lineHeight: 1.65, color: COLORS.white }}>
                          {feature}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <div
                  style={{
                    marginTop: 22,
                    display: "flex",
                    flexWrap: "wrap",
                    justifyContent: "space-between",
                    gap: 14,
                  }}
                >
                  <button
                    onClick={() => {
                      const currentIndex = PRODUCTS.findIndex((product) => product.id === active.id);
                      if (currentIndex > 0) navigateTo("detail", PRODUCTS[currentIndex - 1]);
                    }}
                    disabled={PRODUCTS[0].id === active.id}
                    style={{
                      border: `1px solid ${COLORS.denim}20`,
                      background: "rgba(255,255,255,0.82)",
                      color: PRODUCTS[0].id === active.id ? "rgba(50, 63, 78, 0.38)" : COLORS.denim,
                      borderRadius: 999,
                      padding: "12px 18px",
                      fontSize: 13,
                      fontWeight: 800,
                      cursor: PRODUCTS[0].id === active.id ? "default" : "pointer",
                    }}
                  >
                    ← Previous product
                  </button>
                  <button
                    onClick={() => {
                      const currentIndex = PRODUCTS.findIndex((product) => product.id === active.id);
                      if (currentIndex < PRODUCTS.length - 1) {
                        navigateTo("detail", PRODUCTS[currentIndex + 1]);
                      } else {
                        navigateTo("overview");
                      }
                    }}
                    style={{
                      border: "none",
                      background: COLORS.coral,
                      color: COLORS.white,
                      borderRadius: 999,
                      padding: "12px 18px",
                      fontSize: 13,
                      fontWeight: 800,
                      cursor: "pointer",
                      boxShadow: "0 14px 30px rgba(221, 91, 87, 0.24)",
                    }}
                  >
                    {PRODUCTS[PRODUCTS.length - 1].id === active.id ? "Back to platform overview →" : "Next product →"}
                  </button>
                </div>
              </section>
            )}
          </main>

          <footer
            style={{
              maxWidth: 1240,
              margin: "0 auto",
              padding: isMobile ? "0 18px 36px" : "0 32px 44px",
              color: COLORS.denim,
            }}
          >
            <div
              style={{
                borderTop: "1px solid rgba(50, 63, 78, 0.12)",
                paddingTop: 18,
                display: "flex",
                flexWrap: "wrap",
                justifyContent: "space-between",
                gap: 10,
                fontSize: 12,
                letterSpacing: "0.12em",
                textTransform: "uppercase",
                fontWeight: 700,
              }}
            >
              <span>BariTotalCare.com</span>
              <span>Bariatric Centers of America</span>
              <span>One connected bariatric growth engine</span>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
